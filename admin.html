<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ismail Biryani Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Raleway:wght@400;600;700&display=swap');

    :root {
      --gold: #b8a030; --gold2: #d4c060; --gold-glow: rgba(184,160,48,0.45);
      --maroon: #7a1515; --maroon2: #a01a1a;
      --bg: #09070a; --card: #140e06; --border: #221a06;
      --text: #f0ead8; --muted: #7a6840; --green: #80ffb0; --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: var(--bg); color: var(--text); font-family: 'Raleway', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px 60px; }

    .top-stripe { width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--maroon), var(--gold), var(--maroon), transparent); margin-bottom: 28px; box-shadow: 0 0 12px rgba(184,160,48,0.3); }

    h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 900; letter-spacing: .06em; background: linear-gradient(180deg, #fff 0%, var(--gold2) 60%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }

    .sub { font-size: .72rem; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 28px; }

    .card { width: 100%; max-width: 480px; background: var(--card); border: 1px solid rgba(184,160,48,.1); border-top: 3px solid var(--gold); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }

    .form-label { display: block; font-size: .68rem; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); margin-bottom: 7px; }

    .form-input { width: 100%; background: #0c0800; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Raleway', sans-serif; font-size: 1rem; font-weight: 600; padding: 12px 16px; outline: none; transition: border-color .2s; }
    .form-input:focus { border-color: var(--gold); }

    .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius); font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; letter-spacing: .06em; cursor: pointer; margin-top: 14px; transition: transform .08s; }
    .btn-primary { background: linear-gradient(135deg, var(--gold), #8a7010); color: #0a0700; box-shadow: 0 6px 24px var(--gold-glow); }
    .btn-primary:active { transform: scale(.97); }
    .btn-danger  { background: #100a04; color: var(--gold2); border: 1px solid rgba(184,160,48,.2); margin-top: 8px; }

    .status-msg { text-align: center; font-size: .8rem; color: var(--muted); margin-top: 10px; min-height: 18px; }
    .status-msg.ok    { color: var(--green); }
    .status-msg.error { color: #ff8888; }

    .section-title { font-size: .65rem; text-transform: uppercase; letter-spacing: .2em; color: var(--muted); margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    .prize-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .prize-icon { font-size: 1.3rem; width: 28px; text-align: center; }
    .prize-name { flex: 1; font-size: .88rem; color: var(--text); }
    .prize-qty  { font-family: 'Playfair Display', serif; font-size: .9rem; font-weight: 700; color: var(--gold2); min-width: 32px; text-align: right; }
    .prize-bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 100px; overflow: hidden; }
    .prize-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--maroon), var(--gold)); transition: width .6s; }

    .players-table { width: 100%; border-collapse: collapse; }
    .players-table th { padding: 8px 10px; font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); }
    .players-table td { padding: 10px 10px; font-size: .82rem; color: var(--text); border-bottom: 1px solid var(--border); }
    .players-table tr:last-child td { border-bottom: none; }

    .url-display { background: #0c0800; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'Courier New', monospace; font-size: .72rem; color: var(--gold2); word-break: break-all; margin-bottom: 12px; }

    #loginScreen, #dashScreen { width: 100%; display: flex; flex-direction: column; align-items: center; }
    #dashScreen { display: none; }
  </style>
</head>
<body>
  <div class="top-stripe"></div>
  <h1>Ismail Biryani Admin</h1>
  <div class="sub">Ismail Group · Ongole Dashboard</div>

  <div id="loginScreen">
    <div class="card" style="max-width:380px;">
      <div class="section-title">Admin Login</div>
      <label class="form-label">Password</label>
      <input class="form-input" id="pwInput" type="password" placeholder="Enter admin password" />
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
      <div class="status-msg error" id="loginErr"></div>
    </div>
  </div>

  <div id="dashScreen">
    <div class="card">
      <div class="section-title">Apps Script URL</div>
      <div class="url-display" id="urlDisplay">Not set</div>
      <label class="form-label">Update URL</label>
      <input class="form-input" id="urlInput" type="text" placeholder="https://script.google.com/macros/s/..." />
      <button class="btn btn-primary" onclick="saveUrl()">Save URL</button>
      <div class="status-msg" id="urlStatus"></div>
    </div>

    <div class="card">
      <div class="section-title">Prize Inventory</div>
      <div id="prizesContent"><div style="color:var(--muted);font-size:.8rem;">Loading…</div></div>
      <button class="btn btn-primary" onclick="loadPrizes()" style="margin-top:16px;">Refresh</button>
    </div>

    <div class="card">
      <div class="section-title">Recent Players</div>
      <div id="playersContent"><div style="color:var(--muted);font-size:.8rem;">Loading…</div></div>
      <button class="btn btn-primary" onclick="loadPlayers()" style="margin-top:16px;">Refresh</button>
    </div>

    <button class="btn btn-danger" style="max-width:480px;width:100%;" onclick="logout()">Logout</button>
  </div>

  <script>
    const PASS='ismail123', LS_KEY='ib_sheet_url';
    let sheetUrl='';

    function doLogin(){const pw=document.getElementById('pwInput').value;if(pw===PASS){document.getElementById('loginScreen').style.display='none';document.getElementById('dashScreen').style.display='flex';loadDash();}else{document.getElementById('loginErr').textContent='Incorrect password.';}}
    document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

    function loadDash(){sheetUrl=localStorage.getItem(LS_KEY)||'';document.getElementById('urlDisplay').textContent=sheetUrl||'Not set';document.getElementById('urlInput').value=sheetUrl;if(sheetUrl){loadPrizes();loadPlayers();}}

    function saveUrl(){const val=document.getElementById('urlInput').value.trim();if(!val.startsWith('https://')){setStatus('urlStatus','Invalid URL','error');return;}sheetUrl=val;localStorage.setItem(LS_KEY,val);document.getElementById('urlDisplay').textContent=val;setStatus('urlStatus','Saved!','ok');loadPrizes();loadPlayers();}

    async function loadPrizes(){if(!sheetUrl)return;const el=document.getElementById('prizesContent');el.innerHTML='<div style="color:var(--muted);font-size:.8rem;">Loading…</div>';try{const res=await fetch(`${sheetUrl}?action=getPrizes`);const data=await res.json();if(!data.prizes)throw new Error();const max=Math.max(...data.prizes.map(p=>p.quantity),1);el.innerHTML=data.prizes.map(p=>`<div class="prize-row"><div class="prize-icon">${p.icon}</div><div class="prize-name">${p.name}</div><div class="prize-bar-track"><div class="prize-bar" style="width:${(p.quantity/max*100).toFixed(0)}%"></div></div><div class="prize-qty">${p.quantity}</div></div>`).join('');}catch(e){el.innerHTML='<div style="color:#ff8888;font-size:.8rem;">Error loading prizes. Check URL.</div>';}}

    async function loadPlayers(){if(!sheetUrl)return;const el=document.getElementById('playersContent');el.innerHTML='<div style="color:var(--muted);font-size:.8rem;">Loading…</div>';try{const res=await fetch(`${sheetUrl}?action=getPlayers`);const data=await res.json();if(!data.players||!data.players.length){el.innerHTML='<div style="color:var(--muted);font-size:.8rem;">No players yet.</div>';return;}el.innerHTML=`<table class="players-table"><thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Time</th></tr></thead><tbody>${data.players.slice(-20).reverse().map((p,i)=>`<tr><td>${i+1}</td><td>${p[1]}</td><td>${p[2]}</td><td style="font-size:.72rem;color:var(--muted)">${p[0]}</td></tr>`).join('')}</tbody></table>`;}catch(e){el.innerHTML='<div style="color:var(--muted);font-size:.8rem;">Player list requires getPlayers action.</div>';}}

    function logout(){document.getElementById('dashScreen').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('pwInput').value='';}

    function setStatus(id,msg,type){const el=document.getElementById(id);el.textContent=msg;el.className='status-msg '+(type||'');setTimeout(()=>{el.textContent='';el.className='status-msg';},3000);}
  </script>
</body>
</html>
